syntax = "proto3";

option csharp_namespace = "ProtoMsg";

// Test messages for GenProto.bat / network smoke test

message TestPingC2S {
  string message = 1;
  int64 timestamp = 2;
}

message TestPongS2C {
  int32 code = 1;       // 0 = ok
  string message = 2;
  int64 server_time = 3;
}

message TestEchoC2S {
  string payload = 1;
}

message TestEchoS2C {
  string payload = 1;
  bool success = 2;
}
